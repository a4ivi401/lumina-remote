server {
    listen 80;
    server_name lumina.a4ivi4.dev;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name lumina.a4ivi4.dev;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/lumina.a4ivi4.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lumina.a4ivi4.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;
    
    location /ws {
        set $upstream http://signal-server:3000;
        proxy_pass $upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}
