version: '3.8'

services:
  signal-server:
    build:
      context: ../
      dockerfile: server/lumina-signal-server/Dockerfile
    restart: always
    environment:
      - RUST_LOG=info
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - signal-server
